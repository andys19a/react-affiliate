<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Graf över växande avkastning</title>
  <desc id="desc">En mörk graf med stigande kurva och markerade datapunkter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0a1121" />
    </linearGradient>
    <linearGradient id="line" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#67e8f9" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" rx="24" />
  <g stroke="#14213d" stroke-width="1" opacity="0.45">
    <line x1="80" x2="880" y1="440" y2="440" />
    <line x1="80" x2="880" y1="360" y2="360" />
    <line x1="80" x2="880" y1="280" y2="280" />
    <line x1="80" x2="880" y1="200" y2="200" />
    <line x1="80" x2="880" y1="120" y2="120" />
  </g>
  <polyline points="80,410 200,360 320,380 440,330 560,260 680,210 800,150 880,190" fill="none" stroke="url(#line)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  <g fill="#22c55e" stroke="#0b1c2f" stroke-width="3">
    <circle cx="200" cy="360" r="12" />
    <circle cx="320" cy="380" r="12" />
    <circle cx="440" cy="330" r="12" />
    <circle cx="560" cy="260" r="12" />
    <circle cx="680" cy="210" r="12" />
    <circle cx="800" cy="150" r="12" />
    <circle cx="880" cy="190" r="12" />
  </g>
  <text x="80" y="95" fill="#e2e8f0" font-family="'Inter', system-ui" font-size="26" font-weight="700">Stabil avkastning över tid</text>
  <text x="80" y="130" fill="#94a3b8" font-family="'Inter', system-ui" font-size="16">Visar exempel på ROI per månad med strikt strategi</text>
</svg>
