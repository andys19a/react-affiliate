      <stop offset="100%" stop-color="#f7b733" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#04111f" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
