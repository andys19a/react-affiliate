    <polyline points="0,410 180,360 320,390 520,300 720,340 940,210 1120,240" fill="none" stroke="url(#line)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
    <g fill="#26d07c" opacity="0.45">
