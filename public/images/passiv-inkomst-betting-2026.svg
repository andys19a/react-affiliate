<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1526"/>
      <stop offset="100%" style="stop-color:#0f2040"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Left green accent bar -->
  <rect x="0" y="0" width="5" height="450" fill="#10b981"/>

  <!-- Subtle green glow top-left -->
  <ellipse cx="80" cy="90" rx="220" ry="160" fill="#10b981" opacity="0.04"/>

  <!-- Main title -->
  <text x="60" y="72" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold">Passiv inkomst</text>
  <text x="60" y="108" fill="#10b981" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold">med betting</text>

  <!-- Subtitle -->
  <text x="60" y="142" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="15">Automatisk avkastning med RebelBetting — 30 min per dag</text>

  <!-- Separator line -->
  <line x1="60" y1="158" x2="740" y2="158" stroke="#1e3050" stroke-width="1"/>

  <!-- Stat box 1: ROI -->
  <rect x="60" y="173" width="200" height="100" rx="10" fill="#0f1f38" stroke="#1e3a5f" stroke-width="1"/>
  <text x="160" y="218" text-anchor="middle" fill="#10b981" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold">5%</text>
  <text x="160" y="241" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">Genomsnittlig ROI</text>
  <text x="160" y="258" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">per satsad krona</text>

  <!-- Stat box 2: Time -->
  <rect x="276" y="173" width="200" height="100" rx="10" fill="#0f1f38" stroke="#1e3a5f" stroke-width="1"/>
  <text x="376" y="215" text-anchor="middle" fill="#10b981" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold">30 min</text>
  <text x="376" y="241" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">Aktiv tid per dag</text>
  <text x="376" y="258" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">med RebelBetting</text>

  <!-- Stat box 3: Tax-free -->
  <rect x="492" y="173" width="248" height="100" rx="10" fill="#0f1f38" stroke="#1e3a5f" stroke-width="1"/>
  <text x="616" y="213" text-anchor="middle" fill="#10b981" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold">Skattefri</text>
  <text x="616" y="241" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">inkomst för svenska</text>
  <text x="616" y="258" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="13">spelare med licens</text>

  <!-- Chart background -->
  <rect x="60" y="293" width="680" height="118" rx="10" fill="#080e1c"/>

  <!-- Chart grid lines -->
  <line x1="80" y1="383" x2="720" y2="383" stroke="#1e2d44" stroke-width="1"/>
  <line x1="80" y1="355" x2="720" y2="355" stroke="#1e2d44" stroke-width="1"/>
  <line x1="80" y1="325" x2="720" y2="325" stroke="#1e2d44" stroke-width="1"/>

  <!-- Chart area fill (gradient under line) -->
  <polygon points="90,386 185,376 290,363 395,349 500,333 605,318 700,305 720,300 720,390 90,390"
           fill="#10b981" opacity="0.07"/>

  <!-- Chart line (upward trend) -->
  <polyline points="90,386 185,376 290,363 395,349 500,333 605,318 700,305 720,300"
            stroke="url(#chartLine)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data dots -->
  <circle cx="90"  cy="386" r="4" fill="#10b981"/>
  <circle cx="290" cy="363" r="4" fill="#10b981"/>
  <circle cx="500" cy="333" r="4" fill="#10b981"/>
  <circle cx="720" cy="300" r="4" fill="#10b981"/>

  <!-- Chart x-axis labels -->
  <text x="90"  y="426" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="11">Mån 1</text>
  <text x="290" y="426" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="11">Mån 3</text>
  <text x="500" y="426" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="11">Mån 6</text>
  <text x="720" y="426" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="11">Mån 12</text>

  <!-- Brand label -->
  <text x="738" y="446" text-anchor="end" fill="#334155" font-family="Arial, sans-serif" font-size="12">profitplay.se</text>
</svg>
