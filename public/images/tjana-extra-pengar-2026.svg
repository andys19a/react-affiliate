<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c851;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e676;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#162744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1e33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#ffffff" stroke-width="1"/>
    <line x1="213" y1="0" x2="213" y2="720" stroke="#ffffff" stroke-width="1"/>
    <line x1="426" y1="0" x2="426" y2="720" stroke="#ffffff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="#ffffff" stroke-width="1"/>
    <line x1="853" y1="0" x2="853" y2="720" stroke="#ffffff" stroke-width="1"/>
    <line x1="1067" y1="0" x2="1067" y2="720" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Decorative circle -->
  <circle cx="1100" cy="120" r="300" fill="#00c851" opacity="0.05"/>
  <circle cx="180" cy="600" r="200" fill="#0066cc" opacity="0.07"/>

  <!-- Green accent bar -->
  <rect x="80" y="180" width="6" height="120" rx="3" fill="url(#greenGrad)" filter="url(#glow)"/>

  <!-- Tag: GUIDE 2026 -->
  <rect x="80" y="130" width="160" height="36" rx="18" fill="url(#greenGrad)" opacity="0.9"/>
  <text x="160" y="153" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#0a1628" text-anchor="middle" letter-spacing="2">GUIDE 2026</text>

  <!-- Main title -->
  <text x="100" y="250" font-family="'Arial Black', 'Arial', sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-1">Tjäna Extra</text>
  <text x="100" y="340" font-family="'Arial Black', 'Arial', sans-serif" font-size="72" font-weight="900" fill="url(#greenGrad)" letter-spacing="-1" filter="url(#glow)">Pengar 2026</text>

  <!-- Subtitle -->
  <text x="100" y="400" font-family="'Arial', sans-serif" font-size="26" fill="#a8c4e0" font-weight="400">5 bevisade metoder — inkl. value betting med RebelBetting</text>

  <!-- Divider line -->
  <line x1="100" y1="430" x2="700" y2="430" stroke="#00c851" stroke-width="2" opacity="0.4"/>

  <!-- Stats cards -->
  <!-- Card 1 -->
  <rect x="100" y="460" width="180" height="90" rx="12" fill="url(#cardGrad)" stroke="#00c851" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="190" y="497" font-family="'Arial', sans-serif" font-size="13" fill="#7aa8cc" text-anchor="middle" letter-spacing="1">GENOMSNITTLIG ROI</text>
  <text x="190" y="530" font-family="'Arial Black', 'Arial', sans-serif" font-size="28" font-weight="900" fill="#00e676" text-anchor="middle">+4-8%</text>

  <!-- Card 2 -->
  <rect x="300" y="460" width="180" height="90" rx="12" fill="url(#cardGrad)" stroke="#00c851" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="390" y="497" font-family="'Arial', sans-serif" font-size="13" fill="#7aa8cc" text-anchor="middle" letter-spacing="1">STARTAR PÅ</text>
  <text x="390" y="530" font-family="'Arial Black', 'Arial', sans-serif" font-size="28" font-weight="900" fill="#00e676" text-anchor="middle">15 min</text>

  <!-- Card 3 -->
  <rect x="500" y="460" width="180" height="90" rx="12" fill="url(#cardGrad)" stroke="#00c851" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="590" y="497" font-family="'Arial', sans-serif" font-size="13" fill="#7aa8cc" text-anchor="middle" letter-spacing="1">RISK</text>
  <text x="590" y="530" font-family="'Arial Black', 'Arial', sans-serif" font-size="28" font-weight="900" fill="#00e676" text-anchor="middle">Låg</text>

  <!-- Right side: Chart illustration -->
  <g transform="translate(800, 150)">
    <!-- Chart background card -->
    <rect width="380" height="400" rx="16" fill="url(#cardGrad)" stroke="#1e3a5f" stroke-width="1" filter="url(#shadow)"/>
    <text x="190" y="40" font-family="'Arial', sans-serif" font-size="16" fill="#7aa8cc" text-anchor="middle" letter-spacing="1">VÄRDEUTVECKLING</text>

    <!-- Chart area -->
    <g transform="translate(30, 60)">
      <!-- Y-axis labels -->
      <text x="0" y="260" font-family="'Arial', sans-serif" font-size="12" fill="#4a7a9b">0</text>
      <text x="0" y="195" font-family="'Arial', sans-serif" font-size="12" fill="#4a7a9b">5k</text>
      <text x="0" y="130" font-family="'Arial', sans-serif" font-size="12" fill="#4a7a9b">10k</text>
      <text x="0" y="65" font-family="'Arial', sans-serif" font-size="12" fill="#4a7a9b">15k</text>

      <!-- Grid lines -->
      <line x1="25" y1="258" x2="320" y2="258" stroke="#1e3a5f" stroke-width="1"/>
      <line x1="25" y1="193" x2="320" y2="193" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="25" y1="128" x2="320" y2="128" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="25" y1="63" x2="320" y2="63" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>

      <!-- Area fill under the curve -->
      <polygon points="25,258 75,238 125,220 175,195 225,165 275,130 320,90 320,258" fill="#00c851" opacity="0.1"/>

      <!-- Chart line: trending up -->
      <polyline points="25,258 75,238 125,220 175,195 225,165 275,130 320,90" fill="none" stroke="url(#greenGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

      <!-- Data points -->
      <circle cx="25" cy="258" r="5" fill="#00e676"/>
      <circle cx="75" cy="238" r="5" fill="#00e676"/>
      <circle cx="125" cy="220" r="5" fill="#00e676"/>
      <circle cx="175" cy="195" r="5" fill="#00e676"/>
      <circle cx="225" cy="165" r="5" fill="#00e676"/>
      <circle cx="275" cy="130" r="5" fill="#00e676"/>
      <circle cx="320" cy="90" r="6" fill="#00e676" filter="url(#glow)"/>

      <!-- Profit label at top -->
      <rect x="270" y="60" width="75" height="28" rx="6" fill="#00c851" opacity="0.9"/>
      <text x="308" y="79" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#0a1628" text-anchor="middle">+12 400 kr</text>

      <!-- X-axis months -->
      <text x="25" y="280" font-family="'Arial', sans-serif" font-size="11" fill="#4a7a9b" text-anchor="middle">Jan</text>
      <text x="125" y="280" font-family="'Arial', sans-serif" font-size="11" fill="#4a7a9b" text-anchor="middle">Mar</text>
      <text x="225" y="280" font-family="'Arial', sans-serif" font-size="11" fill="#4a7a9b" text-anchor="middle">Maj</text>
      <text x="320" y="280" font-family="'Arial', sans-serif" font-size="11" fill="#4a7a9b" text-anchor="middle">Jun</text>
    </g>

    <!-- RebelBetting badge -->
    <rect x="60" y="340" width="260" height="46" rx="23" fill="#00c851" opacity="0.12" stroke="#00c851" stroke-width="1" stroke-opacity="0.4"/>
    <text x="190" y="368" font-family="'Arial', sans-serif" font-size="15" font-weight="700" fill="#00e676" text-anchor="middle">Med RebelBetting</text>
  </g>

  <!-- Logo / Brand -->
  <text x="100" y="660" font-family="'Arial', sans-serif" font-size="18" font-weight="700" fill="#00c851" opacity="0.8">ProfitPlay.se</text>
  <line x1="100" y1="672" x2="1180" y2="672" stroke="#1e3a5f" stroke-width="1"/>
  <text x="1180" y="660" font-family="'Arial', sans-serif" font-size="14" fill="#4a7a9b" text-anchor="end">Matematisk fördel mot spelbolagen</text>
</svg>
