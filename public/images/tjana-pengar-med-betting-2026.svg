<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Tjäna pengar med betting 2026 – value betting vs vanlig betting</title>
  <desc id="desc">Jämförelse mellan value betting och vanlig betting: hur value betting ger stabil avkastning medan vanlig betting förlorar pengar på sikt.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a" />
      <stop offset="60%" stop-color="#0f2540" />
      <stop offset="100%" stop-color="#0b3045" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1a9e5c" />
      <stop offset="100%" stop-color="#26d07c" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#e05252" />
      <stop offset="100%" stop-color="#c03030" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd166" />
      <stop offset="100%" stop-color="#f7a529" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0e2035" />
      <stop offset="100%" stop-color="#091a2c" />
    </linearGradient>
    <linearGradient id="greenFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#26d07c" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#26d07c" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="redFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e05252" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#e05252" stop-opacity="0.18" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#020d1a" flood-opacity="0.55" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)" />

  <!-- Subtle glow blobs -->
  <circle cx="200" cy="120" r="180" fill="#26d07c" opacity="0.04" />
  <circle cx="1050" cy="550" r="200" fill="#1a6b9e" opacity="0.06" />
  <circle cx="650" cy="350" r="300" fill="#0d4070" opacity="0.04" />

  <!-- Headline -->
  <text x="600" y="62" text-anchor="middle" fill="#e8f4ff" font-family="'Inter', system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.5">Tjäna pengar med betting 2026</text>
  <text x="600" y="100" text-anchor="middle" fill="#6ba8c8" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="400">Value betting vs vanlig betting – se varför matematiken vinner</text>

  <!-- Chart area background -->
  <rect x="80" y="120" width="740" height="390" rx="16" fill="url(#cardGrad)" stroke="#1a4060" stroke-width="1.5" filter="url(#shadow)" />

  <!-- Chart title -->
  <text x="200" y="152" text-anchor="middle" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="16" font-weight="600">Avkastning över tid (6 månader)</text>

  <!-- Y-axis labels -->
  <text x="105" y="178" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">+30%</text>
  <text x="105" y="228" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">+15%</text>
  <text x="105" y="278" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">0%</text>
  <text x="105" y="328" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">-15%</text>
  <text x="105" y="378" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">-30%</text>
  <text x="105" y="428" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">-45%</text>
  <text x="105" y="478" text-anchor="end" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">-60%</text>

  <!-- Grid lines -->
  <line x1="110" y1="175" x2="800" y2="175" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="110" y1="225" x2="800" y2="225" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="110" y1="275" x2="800" y2="275" stroke="#2a5070" stroke-width="1.5" />
  <line x1="110" y1="325" x2="800" y2="325" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="110" y1="375" x2="800" y2="375" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="110" y1="425" x2="800" y2="425" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="110" y1="475" x2="800" y2="475" stroke="#1a3a55" stroke-width="1" stroke-dasharray="4,4" />

  <!-- X-axis labels (months) -->
  <text x="150" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 1</text>
  <text x="262" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 2</text>
  <text x="374" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 3</text>
  <text x="486" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 4</text>
  <text x="598" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 5</text>
  <text x="710" y="500" text-anchor="middle" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="12">Mån 6</text>

  <!-- VALUE BETTING line (green, going up with variance) -->
  <!-- Fill area under green line -->
  <polygon points="150,275 190,265 230,270 262,255 310,248 374,238 420,245 486,228 540,220 598,210 650,215 710,198 760,192 800,185 800,275 150,275"
    fill="url(#greenFill)" />

  <!-- Green line: value betting -->
  <polyline points="150,275 190,265 230,270 262,255 310,248 374,238 420,245 486,228 540,220 598,210 650,215 710,198 760,192 800,185"
    fill="none" stroke="#26d07c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Green endpoint arrow/dot -->
  <circle cx="800" cy="185" r="7" fill="#26d07c" filter="url(#glow)" />
  <text x="810" y="182" fill="#26d07c" font-family="'Inter', system-ui" font-size="13" font-weight="700">+24%</text>

  <!-- VANLIG BETTING line (red, going down) -->
  <!-- Fill area under red line -->
  <polygon points="150,275 190,280 230,295 262,305 310,318 374,330 420,345 486,358 540,372 598,388 650,402 710,418 760,435 800,450 800,275 150,275"
    fill="url(#redFill)" />

  <!-- Red line: vanlig betting -->
  <polyline points="150,275 190,280 230,295 262,305 310,318 374,330 420,345 486,358 540,372 598,388 650,402 710,418 760,435 800,450"
    fill="none" stroke="#e05252" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4" />

  <!-- Red endpoint dot -->
  <circle cx="800" cy="450" r="7" fill="#e05252" />
  <text x="810" y="447" fill="#e05252" font-family="'Inter', system-ui" font-size="13" font-weight="700">-58%</text>

  <!-- Legend -->
  <rect x="130" y="505" width="180" height="26" rx="6" fill="#0a1f30" stroke="#1a4060" stroke-width="1" />
  <line x1="148" y1="518" x2="172" y2="518" stroke="#26d07c" stroke-width="3" />
  <circle cx="160" cy="518" r="4" fill="#26d07c" />
  <text x="180" y="523" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="12" font-weight="600">Value Betting</text>

  <rect x="330" y="505" width="200" height="26" rx="6" fill="#0a1f30" stroke="#1a4060" stroke-width="1" />
  <line x1="348" y1="518" x2="372" y2="518" stroke="#e05252" stroke-width="3" stroke-dasharray="5,3" />
  <circle cx="360" cy="518" r="4" fill="#e05252" />
  <text x="380" y="523" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="12" font-weight="600">Vanlig Betting</text>

  <!-- RIGHT PANEL: Stats cards -->
  <!-- Card 1: Monthly earnings -->
  <rect x="848" y="120" width="310" height="130" rx="14" fill="url(#cardGrad)" stroke="#1a4060" stroke-width="1.5" filter="url(#shadow)" />
  <circle cx="882" cy="155" r="22" fill="url(#greenGrad)" />
  <text x="882" y="161" text-anchor="middle" fill="white" font-family="'Inter', system-ui" font-size="18" font-weight="800">kr</text>
  <text x="918" y="147" fill="#6ba8c8" font-family="'Inter', system-ui" font-size="13">Typisk månadsinkomst</text>
  <text x="918" y="172" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="28" font-weight="800">2 000–5 000</text>
  <text x="918" y="196" fill="#26d07c" font-family="'Inter', system-ui" font-size="13" font-weight="600">kr/månad med value betting</text>
  <text x="918" y="218" fill="#4a7a9a" font-family="'Inter', system-ui" font-size="11">*vid bankrulle 10 000–20 000 kr</text>

  <!-- Card 2: Time per day -->
  <rect x="848" y="265" width="310" height="110" rx="14" fill="url(#cardGrad)" stroke="#1a4060" stroke-width="1.5" filter="url(#shadow)" />
  <circle cx="882" cy="297" r="22" fill="url(#greenGrad)" />
  <text x="882" y="303" text-anchor="middle" fill="white" font-family="'Inter', system-ui" font-size="16" font-weight="800">⏱</text>
  <text x="918" y="289" fill="#6ba8c8" font-family="'Inter', system-ui" font-size="13">Tidsåtgång per dag</text>
  <text x="918" y="318" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="28" font-weight="800">15–30 min</text>
  <text x="918" y="345" fill="#26d07c" font-family="'Inter', system-ui" font-size="13" font-weight="600">med RebelBetting-verktyget</text>

  <!-- Card 3: ROI -->
  <rect x="848" y="390" width="310" height="110" rx="14" fill="url(#cardGrad)" stroke="#26d07c" stroke-width="2" filter="url(#shadow)" />
  <circle cx="882" cy="422" r="22" fill="url(#greenGrad)" />
  <text x="882" y="428" text-anchor="middle" fill="white" font-family="'Inter', system-ui" font-size="16" font-weight="800">%</text>
  <text x="918" y="414" fill="#6ba8c8" font-family="'Inter', system-ui" font-size="13">Förväntad ROI per insats</text>
  <text x="918" y="443" fill="#e8f4ff" font-family="'Inter', system-ui" font-size="28" font-weight="800">3–8%</text>
  <text x="918" y="470" fill="#26d07c" font-family="'Inter', system-ui" font-size="13" font-weight="600">långsiktig avkastning på value bets</text>

  <!-- Bottom CTA bar -->
  <rect x="80" y="554" width="1078" height="68" rx="16" fill="#091e32" stroke="#26d07c" stroke-width="1.5" />
  <circle cx="118" cy="588" r="14" fill="#26d07c" opacity="0.9" />
  <text x="118" y="594" text-anchor="middle" fill="#041a0e" font-family="'Inter', system-ui" font-size="14" font-weight="800">✓</text>
  <text x="600" y="578" text-anchor="middle" fill="#26d07c" font-family="'Inter', system-ui" font-size="20" font-weight="700">Starta med RebelBetting – gratis provperiod</text>
  <text x="600" y="606" text-anchor="middle" fill="#6ba8c8" font-family="'Inter', system-ui" font-size="13">Testa value betting utan risk och se hur matematiken jobbar för dig</text>
</svg>
