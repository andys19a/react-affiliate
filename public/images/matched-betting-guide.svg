<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22c55e" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circle elements -->
  <circle cx="1100" cy="80" r="120" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="80" r="80" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="550" r="100" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.2"/>

  <!-- Top label -->
  <rect x="40" y="40" width="220" height="36" rx="18" fill="#22c55e" opacity="0.9"/>
  <text x="150" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="1">KOMPLETT GUIDE 2026</text>

  <!-- Main title -->
  <text x="60" y="155" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white" filter="url(#shadow)">MATCHED</text>
  <text x="60" y="240" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#greenGrad)" filter="url(#glow)">BETTING</text>
  <text x="60" y="300" font-family="Arial Black, Arial, sans-serif" font-size="40" font-weight="700" fill="white" opacity="0.9">SVERIGE 2026</text>

  <!-- Subtitle -->
  <text x="60" y="350" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Tjäna pengar med bonusar – utan risk</text>

  <!-- Divider line -->
  <line x1="60" y1="375" x2="520" y2="375" stroke="#22c55e" stroke-width="3" opacity="0.7"/>

  <!-- Key points -->
  <g transform="translate(60, 400)">
    <!-- Point 1 -->
    <circle cx="12" cy="12" r="8" fill="#22c55e"/>
    <text x="30" y="17" font-family="Arial, sans-serif" font-size="18" fill="white">Riskfria vinster från välkomstbonusar</text>
  </g>
  <g transform="translate(60, 435)">
    <circle cx="12" cy="12" r="8" fill="#22c55e"/>
    <text x="30" y="17" font-family="Arial, sans-serif" font-size="18" fill="white">Steg-för-steg guide för nybörjare</text>
  </g>
  <g transform="translate(60, 470)">
    <circle cx="12" cy="12" r="8" fill="#22c55e"/>
    <text x="30" y="17" font-family="Arial, sans-serif" font-size="18" fill="white">Vägen till value betting och RebelBetting</text>
  </g>

  <!-- Right side: Diagram -->
  <!-- Back Bet card -->
  <rect x="640" y="120" width="230" height="140" rx="16" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="755" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.8" letter-spacing="2">BACK BET</text>
  <text x="755" y="205" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">+100 kr</text>
  <text x="755" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.75">Spelbolag (odds 2.00)</text>

  <!-- Lay Bet card -->
  <rect x="920" y="120" width="230" height="140" rx="16" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="1035" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.8" letter-spacing="2">LAY BET</text>
  <text x="1035" y="205" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">-97 kr</text>
  <text x="1035" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.75">Bettingbörs (Betfair)</text>

  <!-- Arrows pointing down -->
  <line x1="755" y1="270" x2="755" y2="330" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="748,325 755,342 762,325" fill="#94a3b8"/>
  <line x1="1035" y1="270" x2="1035" y2="330" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="1028,325 1035,342 1042,325" fill="#94a3b8"/>

  <!-- Plus sign between cards -->
  <circle cx="890" cy="195" r="24" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="890" y="203" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">+</text>

  <!-- Result / Profit card -->
  <rect x="760" y="350" width="390" height="160" rx="20" fill="url(#greenGrad)" filter="url(#glow)"/>
  <text x="955" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" opacity="0.9" letter-spacing="2">GARANTERAD VINST</text>
  <text x="955" y="455" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="white">≈ +45 kr</text>
  <text x="955" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.85">Från gratisspelet – oavsett utfall!</text>

  <!-- Equals sign / arrow from cards to result -->
  <line x1="890" y1="345" x2="890" y2="355" stroke="#22c55e" stroke-width="3"/>

  <!-- Equation connector lines -->
  <line x1="755" y1="342" x2="755" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1035" y1="342" x2="1035" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="755" y1="360" x2="1035" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <line x1="890" y1="360" x2="890" y2="352" stroke="#22c55e" stroke-width="3"/>
  <polygon points="883,352 890,337 897,352" fill="#22c55e"/>

  <!-- Footer bar -->
  <rect x="0" y="585" width="1200" height="45" fill="#0f172a" opacity="0.95"/>
  <text x="60" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#22c55e">ProfitPlay.se</text>
  <text x="220" y="614" font-family="Arial, sans-serif" font-size="15" fill="#64748b">|  Value Betting &amp; Matched Betting Guide</text>
  <text x="1140" y="614" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#475569">2026</text>
</svg>
